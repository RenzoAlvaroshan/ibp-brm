server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Dataverse proxies ─────────────────────────────────────────────────────
    # Same-origin paths the frontend calls (see src/dataverse/client.ts) so the
    # browser is not blocked by CORS; nginx forwards them to Microsoft.
    resolver 127.0.0.11 8.8.8.8 ipv6=off valid=30s;

    location /dv-token/ {
        proxy_pass https://login.microsoftonline.com/;
        proxy_set_header Host login.microsoftonline.com;
        proxy_ssl_server_name on;
    }

    location /dv-api/ {
        proxy_pass https://org9e2b1aa4.api.crm5.dynamics.com/;
        proxy_set_header Host org9e2b1aa4.api.crm5.dynamics.com;
        proxy_ssl_server_name on;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
